services:
  postgres:
    image: postgres:15
    container_name: dac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dac
      POSTGRES_PASSWORD: dac
      POSTGRES_DB: dac
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dac"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  mongo:
    image: mongo:7
    container_name: dac-mongo
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dac-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  cliente-service:
    build: ./services/cliente-service
    container_name: cliente-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  conta-service:
    build: ./services/conta-service
    container_name: conta-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  gerente-service:
    build: ./services/gerente-service
    container_name: gerente-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

  gateway:
    build: ./gateway
    container_name: gateway
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_healthy
      cliente-service:
        condition: service_healthy
      conta-service:
        condition: service_healthy
      gerente-service:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac-network

volumes:
  postgres_data:
  mongo_data:
  mongo_config:
  rabbitmq_data:

networks:
  dac-network:
    driver: bridge
