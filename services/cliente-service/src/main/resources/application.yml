server:
  port: 8080

spring:
  application:
    name: cliente-service

  datasource:
    url: jdbc:postgresql://postgres:5432/dac
    username: dac
    password: dac
    driver-class-name: org.postgresql.Driver

  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        hbm2ddl:
          auto: none
        format_sql: true

  sql:
    init:
      mode: never

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health
